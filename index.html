<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      gap: 24px;
    }
    canvas {
      border: 3px solid #fff;
      background: #000;
    }
    .panel { max-width: 220px; }
    button {
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <canvas id="game" width="300" height="600"></canvas>
  <div class="panel">
    <h1>Tetris</h1>
    <p>Score: <span id="score">0</span></p>
    <p>Level: <span id="level">1</span></p>
    <p>Lines: <span id="lines">0</span></p>
    <button onclick="resetGame()">Restart</button>
    <p><strong>Controls</strong><br>
      ← → Move<br>
      ↑ Rotate<br>
      ↓ Soft Drop<br>
      Space Hard Drop<br>
      P Pause
    </p>
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.scale(30, 30);

const ROWS = 20, COLS = 10;
const colors = [null,'#00f0f0','#0000f0','#f0a000','#f0f000','#00f000','#a000f0','#f00000'];

const pieces = {
  T:[[0,0,0],[1,1,1],[0,1,0]],
  O:[[2,2],[2,2]],
  L:[[0,3,0],[0,3,0],[0,3,3]],
  J:[[0,4,0],[0,4,0],[4,4,0]],
  I:[[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]],
  S:[[0,6,6],[6,6,0],[0,0,0]],
  Z:[[7,7,0],[0,7,7],[0,0,0]]
};

function createMatrix(w,h){ return Array.from({length:h},()=>Array(w).fill(0)); }
const arena = createMatrix(COLS, ROWS);

const player = { pos:{x:0,y:0}, matrix:null, score:0, lines:0, level:1 };

function drawMatrix(matrix, offset){
  matrix.forEach((row,y)=>row.forEach((value,x)=>{
    if(value){
      ctx.fillStyle = colors[value];
      ctx.fillRect(x+offset.x, y+offset.y, 1, 1);
      ctx.strokeStyle = '#111';
      ctx.strokeRect(x+offset.x, y+offset.y, 1, 1);
    }
  }));
}

function draw(){
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  drawMatrix(arena,{x:0,y:0});
  drawMatrix(player.matrix, player.pos);
}

function collide(arena, player){
  const [m,o] = [player.matrix, player.pos];
  for(let y=0;y<m.length;y++) for(let x=0;x<m[y].length;x++){
    if(m[y][x] && (arena[y+o.y] && arena[y+o.y][x+o.x]) !== 0) return true;
  }
  return false;
}

function merge(arena, player){
  player.matrix.forEach((row,y)=>row.forEach((value,x)=>{
    if(value) arena[y+player.pos.y][x+player.pos.x] = value;
  }));
}

function rotate(matrix){
  for(let y=0;y<matrix.length;y++) for(let x=0;x<y;x++) [matrix[x][y],matrix[y][x]]=[matrix[y][x],matrix[x][y]];
  matrix.forEach(row=>row.reverse());
}

function playerDrop(){
  player.pos.y++;
  if(collide(arena, player)){
    player.pos.y--;
    merge(arena, player);
    arenaSweep();
    playerReset();
  }
  dropCounter = 0;
}

function hardDrop(){ while(!collide(arena, player)) player.pos.y++; player.pos.y--; playerDrop(); }

function playerMove(dir){
  player.pos.x += dir;
  if(collide(arena, player)) player.pos.x -= dir;
}

function playerRotate(){
  const pos = player.pos.x;
  let offset = 1;
  rotate(player.matrix);
  while(collide(arena, player)){
    player.pos.x += offset;
    offset = -(offset + (offset>0?1:-1));
    if(offset > player.matrix[0].length){
      rotate(player.matrix); rotate(player.matrix); rotate(player.matrix);
      player.pos.x = pos;
      return;
    }
  }
}

function arenaSweep(){
  let rowCount = 1;
  outer: for(let y=arena.length-1;y>=0;y--){
    for(let x=0;x<arena[y].length;x++) if(arena[y][x]===0) continue outer;
    const row = arena.splice(y,1)[0].fill(0);
    arena.unshift(row);
    y++;
    player.score += rowCount * 100;
    player.lines++;
    rowCount *= 2;
  }
  player.level = 1 + Math.floor(player.lines / 10);
  updateStats();
}

function playerReset(){
  const types = 'TJLOSZI';
  player.matrix = pieces[types[Math.random()*types.length|0]].map(r=>[...r]);
  player.pos.y = 0;
  player.pos.x = (COLS/2|0) - (player.matrix[0].length/2|0);
  if(collide(arena, player)){
    alert('Game Over');
    arena.forEach(row=>row.fill(0));
    player.score = 0; player.lines = 0; player.level = 1;
    updateStats();
  }
}

function updateStats(){
  document.getElementById('score').textContent = player.score;
  document.getElementById('lines').textContent = player.lines;
  document.getElementById('level').textContent = player.level;
}

let dropCounter = 0, lastTime = 0, paused = false;
function update(time=0){
  const delta = time - lastTime;
  lastTime = time;
  if(!paused){
    dropCounter += delta;
    if(dropCounter > Math.max(100, 1000 - (player.level-1)*100)) playerDrop();
    draw();
  }
  requestAnimationFrame(update);
}

function resetGame(){
  arena.forEach(row=>row.fill(0));
  player.score = 0; player.lines = 0; player.level = 1;
  updateStats();
  playerReset();
}

document.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft') playerMove(-1);
  else if(e.key==='ArrowRight') playerMove(1);
  else if(e.key==='ArrowDown') playerDrop();
  else if(e.key==='ArrowUp') playerRotate();
  else if(e.code==='Space') { e.preventDefault(); hardDrop(); }
  else if(e.key.toLowerCase()==='p') paused = !paused;
});

playerReset();
updateStats();
update();
</script>
</body>
</html>
