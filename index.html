<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<title>Tetris Game</title>

<style>

body {

background-color: #111;

color: #fff;

font-family: Arial, sans-serif;

text-align: center;

margin: 0;

padding: 20px;

}


.container {

display: flex;

justify-content: center;

align-items: flex-start;

gap: 20px;

}


canvas {

background: #000;

border: 2px solid #fff;

}


.info {

text-align: left;

}

</style>

</head>

<body>

<h1>Tetris</h1>

<div class="container">

<canvas id="tetris" width="240" height="400"></canvas>

<div class="info">

<p><strong>Score:</strong> <span id="score">0</span></p>

<p><strong>Controls:</strong></p>

<ul>

<li>⬅️ Move Left</li>

<li>➡️ Move Right</li>

<li>⬇️ Move Down</li>

<li>🔄 Rotate (↑)</li>

</ul>

</div>

</div>

<script>

const canvas = document.getElementById("tetris");

const ctx = canvas.getContext("2d");

ctx.scale(20, 20); // Scale the drawing to 20px grid blocks


const SHAPES = {

T: [

[0, 1, 0],

[1, 1, 1],

],

O: [

[1, 1],

[1, 1],

],

L: [

[0, 0, 1],

[1, 1, 1],

],

J: [

[1, 0, 0],

[1, 1, 1],

],

I: [[1, 1, 1, 1]],

S: [

[0, 1, 1],

[1, 1, 0],

],

Z: [

[1, 1, 0],

[0, 1, 1],

],

};


function createPiece(type) {

return SHAPES[type];

}


function drawMatrix(matrix, offset) {

matrix.forEach((row, y) => {

row.forEach((value, x) => {

if (value !== 0) {

ctx.fillStyle = "cyan";

ctx.fillRect(x + offset.x, y + offset.y, 1, 1);

}

});

});

}


function createArena(width, height) {

const matrix = [];

while (height--) {

matrix.push(new Array(width).fill(0));

}

return matrix;

}


function collide(arena, player) {

const [matrix, pos] = [player.matrix, player.pos];

for (let y = 0; y < matrix.length; y++) {

for (let x = 0; x < matrix[y].length; x++) {

if (

matrix[y][x] !== 0 &&

(arena[y + pos.y] && arena[y + pos.y][x + pos.x]) !== 0

) {

return true;

}

}

}

return false;

}


function merge(arena, player) {

player.matrix.forEach((row, y) => {

row.forEach((value, x) => {

if (value !== 0) {

arena[y + player.pos.y][x + player.pos.x] = value;

}

});

});

}


function sweepArena() {

outer: for (let y = arena.length - 1; y >= 0; y--) {

for (let x = 0; x < arena[y].length; x++) {

if (arena[y][x] === 0) continue outer;

}

arena.splice(y, 1);

arena.unshift(new Array(12).fill(0));

player.score += 10;

updateScore();

}

}


function playerDrop() {

player.pos.y++;

if (collide(arena, player)) {

player.pos.y--;

merge(arena, player);

playerReset();

sweepArena();

}

dropCounter = 0;

}


function playerReset() {

const pieces = "TJLOSZI";

player.matrix = createPiece(

pieces[Math.floor(Math.random() * pieces.length)]

);

player.pos.y = 0;

player.pos.x =

((arena[0].length / 2) | 0) - ((player.matrix[0].length / 2) | 0);


if (collide(arena, player)) {

arena.forEach((row) => row.fill(0));

player.score = 0;

updateScore();

alert("Game Over!");

}

}


function rotate(matrix) {

return matrix[0].map((_, i) => matrix.map((row) => row[i])).reverse();

}


function draw() {

ctx.fillStyle = "#000";

ctx.fillRect(0, 0, canvas.width, canvas.height);


drawMatrix(arena, { x: 0, y: 0 });

drawMatrix(player.matrix, player.pos);

}

let dropCounter = 0;

let dropInterval = 1000;

let lastTime = 0;


function update(time = 0) {

const deltaTime = time - lastTime;

lastTime = time;

dropCounter += deltaTime;


if (dropCounter > dropInterval) {

playerDrop();

}


draw();

requestAnimationFrame(update);

}


document.addEventListener("keydown", (event) => {

if (event.key === "ArrowLeft") player.pos.x--;

else if (event.key === "ArrowRight") player.pos.x++;

else if (event.key === "ArrowDown") playerDrop();

else if (event.key === "ArrowUp") player.matrix = rotate(player.matrix);


if (collide(arena, player)) {

if (event.key === "ArrowLeft") player.pos.x++;

else if (event.key === "ArrowRight") player.pos.x--;

else if (event.key === "ArrowUp")

player.matrix = rotate(rotate(rotate(player.matrix))); // undo rotate

}

});


function updateScore() {

document.getElementById("score").innerText = player.score;

}


const arena = createArena(12, 20);

const player = {

pos: { x: 0, y: 0 },

matrix: null,

score: 0,

};


playerReset();

updateScore();

update();

</script>

</body>

</html>
